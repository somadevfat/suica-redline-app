<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suica PDF 赤線出力</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <h1>Suica PDF 赤線出力</h1>

    <p class="note">
      モバイルSuicaの残高ご利用明細PDFを読み込み、明細行ごとに赤線を引いたPDFを個別出力します。
    </p>

    <section class="card">
      <label for="pdfFile">PDFを選択</label>
      <input id="pdfFile" type="file" accept="application/pdf" />
    </section>

    <div class="work-layout">
      <section class="card details-card">
        <h2>検出された明細</h2>
        <div id="status">PDFを選択してください。</div>
        <div id="rows"></div>
        <button id="downloadAll" disabled>すべて個別PDFで出力</button>
      </section>

      <section class="card preview-card">
        <h2>プレビュー</h2>
        <div id="previewStatus" class="preview-status">PDFを選択してください。</div>
        <canvas id="pdfCanvas"></canvas>
      </section>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="./suica.js"></script>
  <script src="./app.js"></script>
</body>
</html>
